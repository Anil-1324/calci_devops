apiVersion: apps/v1
kind: Deployment
metadata:
  name: calci-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: calci
  template:
    metadata:
      labels:
        app: calci
    spec:
      containers:
        - name: calci-container
          image: anil1324/calci-devops:latest
          ports:
            - containerPort: 8080
